name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      jar-name: ${{ steps.jar.outputs.name }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build shadowJar
        run: ./gradlew shadowJar

      - name: Determine jar name
        id: jar
        shell: bash
        run: |
          JAR_PATH="$(ls -1 build/libs/*-all.jar | head -n 1)"
          JAR_FILE="$(basename "$JAR_PATH")"
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$JAR_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.jar.outputs.name }}
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build.outputs.jar-name }}
          path: artifact

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: artifact/*
          generate_release_notes: true
